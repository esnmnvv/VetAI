<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Демо-чата VetAI</title>
  <desc id="desc">Экран чата с выбором животного, быстрыми симптомами и ответом AI.</desc>
  <rect width="1280" height="720" fill="#f7faf4"/>
  <rect x="74" y="50" width="1132" height="620" rx="18" fill="#ffffff" stroke="#dfe8d6"/>
  <text x="112" y="112" fill="#17210f" font-family="Arial, sans-serif" font-size="42" font-weight="700">Попробуйте AI-консультацию</text>
  <text x="112" y="150" fill="#596350" font-family="Arial, sans-serif" font-size="19">Опишите симптомы, выберите животное и получите первичную рекомендацию.</text>
  <rect x="112" y="192" width="310" height="396" rx="14" fill="#f3f8ea" stroke="#dfe8d6"/>
  <text x="140" y="236" fill="#26351e" font-family="Arial, sans-serif" font-size="20" font-weight="700">Животное</text>
  <rect x="140" y="262" width="114" height="42" rx="9" fill="#3b6d11"/>
  <text x="168" y="289" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Корова</text>
  <rect x="266" y="262" width="104" height="42" rx="9" fill="#ffffff" stroke="#cddbc4"/>
  <text x="292" y="289" fill="#26351e" font-family="Arial, sans-serif" font-size="17">Овца</text>
  <text x="140" y="352" fill="#26351e" font-family="Arial, sans-serif" font-size="20" font-weight="700">Быстрые симптомы</text>
  <rect x="140" y="378" width="104" height="32" rx="16" fill="#ffffff" stroke="#cddbc4"/>
  <text x="158" y="400" fill="#596350" font-family="Arial, sans-serif" font-size="15">не ест</text>
  <rect x="252" y="378" width="144" height="32" rx="16" fill="#ffffff" stroke="#cddbc4"/>
  <text x="270" y="400" fill="#596350" font-family="Arial, sans-serif" font-size="15">температура</text>
  <rect x="140" y="420" width="178" height="32" rx="16" fill="#ffffff" stroke="#cddbc4"/>
  <text x="158" y="442" fill="#596350" font-family="Arial, sans-serif" font-size="15">вздутие живота</text>
  <rect x="140" y="478" width="236" height="76" rx="10" fill="#ffffff" stroke="#b8cf9a"/>
  <text x="158" y="508" fill="#596350" font-family="Arial, sans-serif" font-size="15">Корова не ест, кашляет,</text>
  <text x="158" y="532" fill="#596350" font-family="Arial, sans-serif" font-size="15">есть выделения из носа...</text>
  <rect x="618" y="192" width="450" height="396" rx="14" fill="#ffffff" stroke="#dfe8d6"/>
  <rect x="648" y="230" width="300" height="78" rx="16" fill="#f3f8ea"/>
  <text x="672" y="262" fill="#26351e" font-family="Arial, sans-serif" font-size="17" font-weight="700">AI:</text>
  <text x="712" y="262" fill="#596350" font-family="Arial, sans-serif" font-size="17">Опишите симптомы животного...</text>
  <rect x="748" y="338" width="286" height="68" rx="16" fill="#3b6d11"/>
  <text x="774" y="370" fill="#ffffff" font-family="Arial, sans-serif" font-size="17">Корова не ест и кашляет</text>
  <rect x="648" y="438" width="348" height="112" rx="16" fill="#f3f8ea"/>
  <text x="672" y="470" fill="#26351e" font-family="Arial, sans-serif" font-size="17" font-weight="700">Вероятный диагноз: пневмония</text>
  <text x="672" y="500" fill="#596350" font-family="Arial, sans-serif" font-size="16">Что делать сейчас: изолировать,</text>
  <text x="672" y="526" fill="#596350" font-family="Arial, sans-serif" font-size="16">обеспечить сухое помещение, вызвать врача.</text>
</svg>
