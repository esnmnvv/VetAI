<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">База болезней VetAI</title>
  <desc id="desc">Экран базы болезней с симптомами и профилактикой.</desc>
  <rect width="1280" height="720" fill="#f7faf4"/>
  <rect x="74" y="50" width="1132" height="620" rx="18" fill="#ffffff" stroke="#dfe8d6"/>
  <text x="112" y="120" fill="#17210f" font-family="Arial, sans-serif" font-size="42" font-weight="700">Болезни в базе</text>
  <text x="112" y="160" fill="#596350" font-family="Arial, sans-serif" font-size="19">Частые заболевания скота и птицы, которые AI учитывает при первичной оценке.</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="112" y="218" width="172" height="44" rx="10" fill="#f3f8ea" stroke="#3b6d11"/>
    <circle cx="136" cy="240" r="7" fill="#ba7517"/>
    <text x="154" y="247" fill="#26351e" font-weight="700">Мастит</text>
    <rect x="300" y="218" width="172" height="44" rx="10" fill="#ffffff" stroke="#dfe8d6"/>
    <circle cx="324" cy="240" r="7" fill="#378add"/>
    <text x="342" y="247" fill="#26351e">Пневмония</text>
    <rect x="488" y="218" width="172" height="44" rx="10" fill="#ffffff" stroke="#dfe8d6"/>
    <circle cx="512" cy="240" r="7" fill="#e24b4a"/>
    <text x="530" y="247" fill="#26351e">Ящур</text>
    <rect x="676" y="218" width="172" height="44" rx="10" fill="#ffffff" stroke="#dfe8d6"/>
    <circle cx="700" cy="240" r="7" fill="#639922"/>
    <text x="718" y="247" fill="#26351e">Чесотка</text>
  </g>
  <rect x="112" y="314" width="960" height="260" rx="14" fill="#f3f8ea" stroke="#dfe8d6"/>
  <circle cx="150" cy="358" r="8" fill="#ba7517"/>
  <text x="174" y="368" fill="#17210f" font-family="Arial, sans-serif" font-size="28" font-weight="700">Мастит</text>
  <text x="142" y="414" fill="#596350" font-family="Arial, sans-serif" font-size="20">Воспаление вымени, которое снижает качество молока и может быстро ухудшить состояние животного.</text>
  <text x="142" y="474" fill="#26351e" font-family="Arial, sans-serif" font-size="20" font-weight="700">Симптомы</text>
  <text x="142" y="512" fill="#596350" font-family="Arial, sans-serif" font-size="18">• уплотнение вымени  • болезненность  • хлопья или кровь в молоке</text>
  <text x="142" y="552" fill="#26351e" font-family="Arial, sans-serif" font-size="20" font-weight="700">Профилактика</text>
  <text x="286" y="552" fill="#596350" font-family="Arial, sans-serif" font-size="18">чистое доение, обработка сосков, регулярная проверка молока.</text>
</svg>
